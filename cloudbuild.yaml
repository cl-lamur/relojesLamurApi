steps:
  # ?? Paso 1: Build de la imagen Docker ?????????????????????
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/relojes-lamur-api:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/relojes-lamur-api:latest'
      - '.'

  # ?? Paso 2: Push al Container Registry ????????????????????
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/relojes-lamur-api:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/relojes-lamur-api:latest'

  # ?? Paso 3: Deploy a Cloud Run ????????????????????????????
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'relojes-lamur-api'
      - '--image=gcr.io/$PROJECT_ID/relojes-lamur-api:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-secrets=ConnectionStrings__DefaultConnection=lamur-db-connection:latest'
      - '--set-secrets=Jwt__Secret=lamur-jwt-secret:latest'
      - '--set-env-vars=ASPNETCORE_ENVIRONMENT=Production'
      - '--set-env-vars=Cors__AllowedOrigins__0=https://TU_PROYECTO.web.app'

images:
  - 'gcr.io/$PROJECT_ID/relojes-lamur-api:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/relojes-lamur-api:latest'

options:
  logging: CLOUD_LOGGING_ONLY
